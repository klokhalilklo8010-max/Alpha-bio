<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha Fuel Fit - Oman</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #ff6b35;
            --secondary: #004e89;
            --accent: #00d9ff;
            --dark: #0a0a0a;
            --darker: #050505;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--darker);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(255, 107, 53, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0, 78, 137, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(0, 217, 255, 0.1) 0%, transparent 50%);
            z-index: -2;
            animation: bgPulse 8s ease-in-out infinite;
        }

        @keyframes bgPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--accent);
            border-radius: 50%;
            opacity: 0.3;
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-100vh) translateX(50px); }
        }

        .lang-switcher {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.5);
            padding: 8px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
        }

        .lang-btn {
            background: transparent;
            border: none;
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Tajawal', sans-serif;
            font-weight: 700;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        .lang-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .lang-btn.active {
            background: var(--primary);
            box-shadow: 0 4px 15px rgba(255, 107, 53, 0.4);
        }

        .progress-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            z-index: 999;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            width: 0%;
            transition: width 0.5s ease;
            box-shadow: 0 0 20px var(--accent);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 100px 20px 50px;
            position: relative;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
        }

        .logo-icon {
            font-size: 4rem;
            margin-bottom: 10px;
            display: inline-block;
            animation: dumbbellLift 3s ease-in-out infinite;
            filter: drop-shadow(0 0 20px rgba(255, 107, 53, 0.5));
        }

        @keyframes dumbbellLift {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-10px) rotate(-5deg); }
            50% { transform: translateY(0) rotate(0deg); }
            75% { transform: translateY(-5px) rotate(5deg); }
        }

        .logo {
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            display: inline-block;
        }

        .logo::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            border-radius: 2px;
        }

        .tagline {
            color: #888;
            margin-top: 15px;
            font-size: 1.2rem;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .step {
            display: none;
            animation: fadeIn 0.6s ease;
        }

        .step.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .step-indicator {
            text-align: center;
            margin-bottom: 30px;
            color: var(--accent);
            font-weight: 700;
            font-size: 1.1rem;
            background: var(--card-bg);
            padding: 10px 25px;
            border-radius: 30px;
            display: inline-block;
            left: 50%;
            transform: translateX(-50%);
            position: relative;
            border: 1px solid var(--border);
        }

        .form-box {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 40px;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        .form-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--accent), var(--primary));
            background-size: 200% 100%;
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .form-title {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 30px;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .emoji {
            font-size: 1.5em;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.3));
        }

        .welcome-box {
            text-align: center;
            padding: 60px 40px;
        }

        .welcome-icon {
            font-size: 6rem;
            margin-bottom: 30px;
            animation: pulse 2s infinite;
            display: inline-block;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .welcome-title {
            font-size: 2.5rem;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .welcome-title span {
            display: block;
        }

        .welcome-title span:last-child {
            color: var(--accent);
            font-size: 3rem;
        }

        .welcome-text {
            font-size: 1.3rem;
            color: #aaa;
            line-height: 1.8;
            margin-bottom: 40px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .start-btn {
            background: linear-gradient(135deg, var(--primary), #ff8c5a);
            color: #fff;
            border: none;
            padding: 20px 60px;
            font-size: 1.3rem;
            font-weight: 800;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Tajawal', sans-serif;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(255, 107, 53, 0.4);
            position: relative;
            overflow: hidden;
        }

        .start-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        .start-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(255, 107, 53, 0.6);
        }

        .start-btn:hover::before {
            left: 100%;
        }

        .gender-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }

        .gender-card {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02));
            border: 2px solid var(--border);
            border-radius: 25px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s;
            position: relative;
            overflow: hidden;
        }

        .gender-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(255, 107, 53, 0.2), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .gender-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(255, 107, 53, 0.2);
        }

        .gender-card:hover::before {
            opacity: 1;
        }

        .gender-card.selected {
            border-color: var(--accent);
            background: linear-gradient(145deg, rgba(0, 217, 255, 0.1), rgba(0, 217, 255, 0.05));
            box-shadow: 0 0 30px rgba(0, 217, 255, 0.3);
        }

        .gender-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            display: block;
        }

        .gender-label {
            font-size: 1.5rem;
            font-weight: 800;
            line-height: 1.4;
        }

        .service-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .service-card {
            background: var(--card-bg);
            border: 2px solid var(--border);
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .service-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }

        .service-card.selected {
            border-color: var(--accent);
            background: rgba(0, 217, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.2);
        }

        .service-card.selected::after {
            content: '✓';
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--accent);
            color: #000;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .service-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            display: block;
        }

        .service-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .service-desc {
            font-size: 0.9rem;
            color: #888;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .form-group {
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 700;
            color: #ddd;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--border);
            border-radius: 15px;
            color: #fff;
            font-family: 'Tajawal', sans-serif;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(0, 217, 255, 0.2);
            background: rgba(255, 255, 255, 0.08);
        }

        .input-hint {
            font-size: 0.85rem;
            color: #666;
            margin-top: 8px;
        }

        .required::after {
            content: ' *';
            color: var(--primary);
        }

        .nutrition-optional {
            background: rgba(255, 107, 53, 0.05);
            border: 1px solid rgba(255, 107, 53, 0.2);
            border-radius: 20px;
            padding: 30px;
            margin-top: 30px;
        }

        .nutrition-title {
            color: var(--primary);
            margin-bottom: 20px;
            font-size: 1.3rem;
        }

        .health-section {
            margin-bottom: 20px;
        }

        .health-section label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #ccc;
        }

        .food-category {
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid var(--border);
        }

        .food-category-title {
            font-size: 1.3rem;
            color: var(--accent);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--border);
        }

        .food-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }

        .food-item {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--border);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .food-item:hover {
            border-color: var(--primary);
            transform: translateY(-3px);
        }

        .food-item.selected {
            border-color: var(--accent);
            background: rgba(0, 217, 255, 0.1);
        }

        .food-item.selected::after {
            content: '✓';
            position: absolute;
            top: 5px;
            right: 5px;
            background: var(--accent);
            color: #000;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .food-icon {
            font-size: 2rem;
            margin-bottom: 8px;
            display: block;
        }

        .food-name {
            font-size: 0.9rem;
            font-weight: 600;
        }

        .supplement-category {
            margin-bottom: 25px;
            background: rgba(0, 217, 255, 0.05);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(0, 217, 255, 0.2);
        }

        .supplement-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            cursor: pointer;
            padding: 15px;
            background: rgba(0, 217, 255, 0.1);
            border-radius: 15px;
            transition: all 0.3s;
        }

        .supplement-header:hover {
            background: rgba(0, 217, 255, 0.2);
        }

        .supplement-header h3 {
            color: var(--accent);
            font-size: 1.2rem;
            flex: 1;
        }

        .toggle-icon {
            font-size: 1.5rem;
            transition: transform 0.3s;
        }

        .supplement-category.expanded .toggle-icon {
            transform: rotate(180deg);
        }

        .supplement-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 12px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease;
        }

        .supplement-category.expanded .supplement-grid {
            max-height: 1000px;
        }

        .supplement-item {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 12px 15px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            font-size: 0.95rem;
        }

        .supplement-item:hover {
            border-color: var(--primary);
        }

        .supplement-item.selected {
            border-color: var(--accent);
            background: rgba(0, 217, 255, 0.15);
            color: var(--accent);
            font-weight: 700;
        }

        .duration-selector {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .duration-btn {
            background: var(--card-bg);
            border: 2px solid var(--border);
            color: #fff;
            padding: 20px 40px;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Tajawal', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            transition: all 0.3s;
            position: relative;
            min-width: 200px;
        }

        .duration-btn:hover {
            border-color: var(--primary);
            transform: translateY(-3px);
        }

        .duration-btn.active {
            border-color: var(--accent);
            background: rgba(0, 217, 255, 0.1);
            box-shadow: 0 0 30px rgba(0, 217, 255, 0.2);

                particle.style.left = Math.random() * 100 + '%';

            currentLang = lang;
            document.documentElement.lang = lang;
            document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
            
            document.getElementById('btn-ar').classList.toggle('active', lang === 'ar');
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');

            } else {

            }
